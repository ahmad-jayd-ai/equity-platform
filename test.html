<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Equity | أكويتي - وحدة اختبارات المحرك المالي والشرعي</title>
  
  <!-- Google Fonts: Tajawal -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    :root {
      --bg-primary: #0b111e;
      --bg-card: rgba(18, 44, 69, 0.4);
      --border-color: rgba(174, 124, 80, 0.2);
      --color-gold: #ae7c50;
      --color-success: #10b981;
      --color-danger: #ef4444;
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background-color: var(--bg-primary);
      color: var(--text-primary);
      font-family: 'Tajawal', sans-serif;
      padding: 2.5rem;
      min-height: 100vh;
    }
    
    .container {
      max-width: 950px;
      margin: 0 auto;
    }
    
    header {
      margin-bottom: 2rem;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    h1 {
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--text-primary);
    }
    
    .header-accent {
      color: var(--color-gold);
    }
    
    .summary-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 2rem;
      display: flex;
      justify-content: space-around;
      text-align: center;
    }
    
    .summary-item {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    
    .summary-label {
      color: var(--text-secondary);
      font-size: 0.9rem;
      font-weight: 700;
    }
    
    .summary-value {
      font-size: 1.8rem;
      font-weight: 800;
      font-family: 'Tajawal', sans-serif;
    }
    
    .test-list {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    
    .test-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      padding: 1.2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: 0.2s;
    }
    
    .test-card.pass {
      border-right: 4px solid var(--color-success);
    }
    
    .test-card.fail {
      border-right: 4px solid var(--color-danger);
    }
    
    .test-details {
      display: flex;
      flex-direction: column;
      gap: 6px;
      width: 80%;
    }
    
    .test-name {
      font-weight: 800;
      font-size: 1.05rem;
    }
    
    .test-desc {
      color: var(--text-secondary);
      font-size: 0.85rem;
    }
    
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 50px;
      font-weight: 800;
      font-size: 0.8rem;
    }
    
    .status-badge.pass {
      background-color: rgba(16, 185, 129, 0.1);
      color: var(--color-success);
      border: 1px solid rgba(16, 185, 129, 0.2);
    }
    
    .status-badge.fail {
      background-color: rgba(239, 68, 68, 0.1);
      color: var(--color-danger);
      border: 1px solid rgba(239, 68, 68, 0.2);
    }
    
    .btn-back {
      background-color: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      padding: 10px 18px;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.9rem;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    
    .btn-back:hover {
      background-color: var(--color-gold);
      color: var(--bg-primary);
    }
  </style>
  
  <!-- Load App Script to access business logic functions -->
  <script src="app.js"></script>
</head>
<body>
  <div class="container">
    <header>
      <div>
        <h1>اختبارات محرك منصة <span class="header-accent">أكويتي</span> المالي</h1>
        <p style="color: var(--text-secondary); font-size: 0.9rem; margin-top: 5px;">التحقق من الضوابط الشرعية، العوائد الثابتة، وحسابات دفاتر الأستاذ العام</p>
      </div>
      <a href="index.html" class="btn-back">
        <i data-lucide="arrow-right"></i>
        <span>العودة للمنصة</span>
      </a>
    </header>
    
    <div class="summary-card">
      <div class="summary-item">
        <span class="summary-label">إجمالي الاختبارات</span>
        <span class="summary-value" id="total-tests">0</span>
      </div>
      <div class="summary-item">
        <span class="summary-label" style="color: var(--color-success);">الناجحة (Pass)</span>
        <span class="summary-value" id="pass-tests" style="color: var(--color-success);">0</span>
      </div>
      <div class="summary-item">
        <span class="summary-label" style="color: var(--color-danger);">الفاشلة (Fail)</span>
        <span class="summary-value" id="fail-tests" style="color: var(--color-danger);">0</span>
      </div>
    </div>
    
    <div class="test-list" id="test-list-container">
      <!-- Dynamic test cards go here -->
    </div>
  </div>

  <script>
    const tests = [];
    
    function addTest(name, description, runFn) {
      tests.push({ name, description, runFn });
    }
    
    // --- DEFINE TESTS ---
    
    // 1. Sharia Match Rule Constraint Test
    addTest(
      "رفض العقود المتماثلة العملة (Sharia Currency Match Check)",
      "يجب أن يرفض المحرك حفظ العقد إذا تساوت عملة رأس المال مع عملة العوائد.",
      () => {
        const res = generateSimulationResults(10000, "USD", "USD", "rate", 10, 12, "2026-01-01");
        if (res.success === false && res.errorMsg.includes("تنبيه شرعي")) {
          return { pass: true, detail: "تم حظر إنشاء العقد بنجاح وإرجاع رسالة التنبيه الشرعية." };
        }
        return { pass: false, detail: "فشل النظام في حظر العقد ذو العملات المتماثلة." };
      }
    );
    
    // 2. Acceptance of Inverse Currencies
    addTest(
      "قبول العقود ذات العملة العكسية (Sharia Inverse Currency Acceptance)",
      "يجب أن يقبل المحرك العقود التي تختلف فيها عملة العوائد عن عملة رأس المال.",
      () => {
        const res = generateSimulationResults(50000, "USD", "IQD", "rate", 8, 12, "2026-01-01");
        if (res.success === true && res.data.monthlyDividendInReturn > 0) {
          return { pass: true, detail: `تم قبول العقد بنجاح. قيمة القسط الشهري بالدينار: ${res.data.monthlyDividendInReturn.toLocaleString()} IQD.` };
        }
        return { pass: false, detail: "فشل النظام في قبول العقد ذو العملة العكسية." };
      }
    );
    
    // 3. Currency Conversion Accuracy
    addTest(
      "دقة محرك تحويل العملات (Exchange Rate Conversion Accuracy)",
      "التحقق من صحة التحويل بين الدولار والعملات الأخرى بناءً على الأسعار المحددة في النظام.",
      () => {
        const initialUSD = 100;
        const iqdVal = convertCurrency(initialUSD, "USD", "IQD");
        const expectedIQD = initialUSD * state.exchangeRates.IQD;
        
        if (Math.abs(iqdVal - expectedIQD) < 0.01) {
          return { pass: true, detail: `100 USD = ${iqdVal} IQD (مطابق تماماً للقيمة المتوقعة).` };
        }
        return { pass: false, detail: `قيمة التحويل غير دقيقة. المتوقع: ${expectedIQD}، الفعلي: ${iqdVal}` };
      }
    );
    
    // 4. Monthly Sulh Dividend Calculation
    addTest(
      "دقة حساب عوائد المصالحة النسبية بالعملة العكسية",
      "التحقق من صحة القيمة المحتسبة للعوائد الشهرية لعقد بالدولار وعوائد بالدينار العراقي كنسبة سنوية (12%).",
      () => {
        const testContract = {
          principal: 100000,
          principalCurrency: "USD",
          returnCurrency: "IQD",
          dividendType: "rate",
          dividendRate: 12.0
        };
        
        const calculatedMonthlyReturn = calculateMonthlyReturn(testContract);
        const expectedMonthlyReturn = 1450000; // (100,000 * 0.12 / 12) * 1450 = 1,450,000 IQD
        
        if (Math.abs(calculatedMonthlyReturn - expectedMonthlyReturn) < 0.01) {
          return { pass: true, detail: `الربح الشهري المحتسب: ${calculatedMonthlyReturn.toLocaleString()} IQD (مطابق لـ 1,450,000 IQD).` };
        }
        return { pass: false, detail: `قيمة الربح الشهري خاطئة. المتوقع: ${expectedMonthlyReturn}، الفعلي: ${calculatedMonthlyReturn}` };
      }
    );
    
    // 5. Fixed Monthly Return Calculation
    addTest(
      "دقة حساب عوائد المصالحة الثابتة (Fixed Monthly Dividend)",
      "التحقق من أن النظام يعتمد العائد الشهري الثابت الذي يدخله المستخدم مباشرة دون تعديل (حالة الـ 300,000 دينار).",
      () => {
        const testContract = {
          principal: 10000,
          principalCurrency: "USD",
          returnCurrency: "IQD",
          dividendType: "fixed",
          monthlyDividendAmount: 300000
        };
        
        const calculatedReturn = calculateMonthlyReturn(testContract);
        if (calculatedReturn === 300000) {
          return { pass: true, detail: "تم اعتماد القيمة الثابتة (300,000 IQD) مباشرة دون تدخل كسور العملة." };
        }
        return { pass: false, detail: `فشل استرجاع العائد الثابت. القيمة المسترجعة: ${calculatedReturn}` };
      }
    );
    
    // 6. Double-Entry Accounting Ledger and Spread posting
    addTest(
      "التحقق من ترحيل فوارق المبالغ إلى حساب الأرباح (Profits Ledger Posting)",
      "التحقق من قيد فارق الأرباح ($10,000 بمستحقات 300,000 للممول و600,000 من المشغل) بقيمة 300,000 دينار في حساب الأرباح.",
      () => {
        // Backup original state
        const originalContracts = [...state.contracts];
        const originalTransactions = [...state.transactions];
        
        // Setup user specific scenario contracts
        state.contracts = [
          {
            id: "t_funder_user",
            partyName: "Funder Abu Ahmed",
            type: "creditor",
            principal: 10000,
            principalCurrency: "USD",
            returnCurrency: "IQD",
            dividendType: "fixed",
            monthlyDividendAmount: 300000,
            duration: 12,
            startDate: "2026-01-01",
            status: "active"
          },
          {
            id: "t_operator_user",
            partyName: "Operator Babel Group",
            type: "debtor",
            principal: 10000,
            principalCurrency: "USD",
            returnCurrency: "IQD",
            dividendType: "fixed",
            monthlyDividendAmount: 600000,
            duration: 12,
            startDate: "2026-01-01",
            status: "active"
          }
        ];
        state.transactions = [];
        
        // Auto-generate dues
        generateDues();
        
        // Find profits posted transaction
        const profitTx = state.transactions.find(t => t.type === 'profit_posted');
        const balances = getAccountBalances();
        
        // Restore state
        state.contracts = originalContracts;
        state.transactions = originalTransactions;
        
        if (profitTx && profitTx.amount === 300000 && balances.profits === 300000) {
          return { pass: true, detail: `تم توليد قيد الفارق بنجاح بقيمة: ${profitTx.amount.toLocaleString()} IQD لصالح حساب الأرباح.` };
        }
        return { pass: false, detail: `فشل قيد فارق الأرباح في الحساب. القيمة المرحلة: ${profitTx ? profitTx.amount : 'غير موجود'}` };
      }
    );

    // 7. Custom Locked Contract Exchange Rate Test
    addTest(
      "دقة حساب سعر الصرف المثبت للعقد (Custom Locked Exchange Rate)",
      "التحقق من أن العقد يستخدم سعر الصرف المخصص المثبت عند إنشائه (مثلاً 1,500 دينار بدلاً من 1,450) لحساب قيمة أرباحه السنوية بالدولار.",
      () => {
        const testContract = {
          principal: 10000,
          principalCurrency: "USD",
          returnCurrency: "IQD",
          dividendType: "fixed",
          monthlyDividendAmount: 300000,
          customExchangeRate: 1500.0 // Custom rate 1500 instead of global 1450
        };
        
        // Annual return in IQD = 300,000 * 12 = 3,600,000 IQD
        // In USD equivalent at locked rate 1500 = 3,600,000 / 1500 = 2400 USD
        const annualReturnUSD = calculateAnnualReturnUSD(testContract);
        const expectedUSD = 2400;
        
        if (Math.abs(annualReturnUSD - expectedUSD) < 0.01) {
          return { pass: true, detail: `العائد السنوي بالدولار بسعر الصرف المخصص: $${annualReturnUSD.toLocaleString()} USD (مطابق تماماً لـ $2,400).` };
        }
        return { pass: false, detail: `القيمة المحتسبة خاطئة. المتوقع: 2400، المحتسب: ${annualReturnUSD}` };
      }
    );

    // 8. Tafqeet Spelling (Words Conversion) Test
    addTest(
      "دقة خوارزمية التفقيط (Tafqeet Conversion Test)",
      "التحقق من صحة تهجئة الأرقام باللغتين العربية والإنجليزية لمبالغ وعملات مختلفة وقواعد النحو والمطابقة للعملات المحددة.",
      () => {
        // Test cases for Arabic Tafqeet
        const arTests = [
          { num: 10000, curr: "USD", expected: "عشرة آلاف دولار أمريكي فقط لا غير" },
          { num: 300000, curr: "IQD", expected: "ثلاثمائة ألف دينار عراقي فقط لا غير" },
          { num: 2, curr: "AED", expected: "درهمان إماراتيان فقط لا غير" },
          { num: 15.50, curr: "USD", expected: "خمسة عشر دولاراً أمريكياً وخمسون سنتاً فقط لا غير" },
          { num: 1.05, curr: "EUR", expected: "يورو واحد وخمسة سنتات فقط لا غير" }
        ];

        // Test cases for English Tafqeet
        const enTests = [
          { num: 10000, curr: "USD", expected: "Ten Thousand US Dollars Only" },
          { num: 300000, curr: "IQD", expected: "Three Hundred Thousand Iraqi Dinars Only" },
          { num: 1.50, curr: "EUR", expected: "One Euro and Fifty Cents Only" }
        ];

        for (const t of arTests) {
          const res = tafqeetArabic(t.num, t.curr);
          if (res !== t.expected) {
            return { pass: false, detail: `فشل التفقيط العربي لـ ${t.num} ${t.curr}. النتيجة: "${res}"، المتوقع: "${t.expected}"` };
          }
        }

        for (const t of enTests) {
          const res = tafqeetEnglish(t.num, t.curr);
          if (res !== t.expected) {
            return { pass: false, detail: `فشل التفقيط الإنجليزي لـ ${t.num} ${t.curr}. النتيجة: "${res}"، المتوقع: "${t.expected}"` };
          }
        }

        return { pass: true, detail: "ناجح: خوارزميات التفقيط باللغتين العربية والإنجليزية تعمل بدقة تامة ومطابقة للقواعد النحوية والعملات المختلفة." };
      }
    );

    // 9. Company Internal Operations Ledger Test
    addTest(
      "حساب محفظة التشغيل الداخلي للشركة (Company Internal Operations Ledger)",
      "التحقق من أن عقد الممول المميز بخيار (التشغيل الداخلي) يرحل قيمته كإيداع تشغيل داخلي، ويضاف رصيده إلى حساب التشغيل الداخلي بدقة، ولا يؤثر على إجمالي ذمم المشغلين الخارجيين.",
      () => {
        // Back up state
        const originalContracts = [...state.contracts];
        
        // Add an internal operations contract
        const testInternalContract = {
          id: "cnt_f_test_internal",
          partyName: "ممول تشغيل داخلي افتراضي",
          type: "creditor",
          principal: 5000,
          principalCurrency: "USD",
          returnCurrency: "IQD",
          dividendType: "fixed",
          monthlyDividendAmount: 150000,
          customExchangeRate: 1450.0,
          isInternal: true,
          status: "active"
        };
        
        state.contracts = [testInternalContract];
        
        // Compute balances
        const balances = getAccountBalances();
        
        // Expected internal operations balance in IQD at locked rate 1450: 5000 * 1450 = 7,250,000 IQD
        const expectedIQD = 5000 * 1450;
        
        // Restore state
        state.contracts = originalContracts;
        
        if (balances.internalOperations === expectedIQD && Object.keys(balances.debtors).length === 0) {
          return { pass: true, detail: `تم احتساب رصيد محفظة التشغيل الداخلي بنجاح بقيمة: ${balances.internalOperations.toLocaleString()} IQD دون التأثير على حسابات المشغلين.` };
        }
        return { pass: false, detail: `فشل فحص حساب التشغيل الداخلي. المتوقع: ${expectedIQD} IQD، المحسوب: ${balances.internalOperations} IQD` };
      }
    );
    
    // 10. Monthly Balance Sheet Calculations (IQD)
    addTest(
      "حساب الميزان الشهري الموحد بالدينار العراقي (Monthly Balance IQD Calculations)",
      "التحقق من صحة تجميع مستحقات المشغلين والممولين بالدينار وصافي الأرباح/الخسائر وتحويل العملات بسعر الصرف الحالي.",
      () => {
        // Backup original state
        const originalContracts = [...state.contracts];
        const originalTransactions = [...state.transactions];
        
        state.contracts = [
          {
            id: "t_cnt_funder",
            partyName: "ممول تجريبي",
            type: "creditor",
            principal: 10000,
            principalCurrency: "USD",
            returnCurrency: "IQD",
            dividendType: "fixed",
            monthlyDividendAmount: 300000,
            duration: 12,
            startDate: "2026-01-01",
            status: "active"
          },
          {
            id: "t_cnt_operator",
            partyName: "مشغل تجريبي",
            type: "debtor",
            principal: 10000,
            principalCurrency: "USD",
            returnCurrency: "USD",
            dividendType: "fixed",
            monthlyDividendAmount: 500,
            duration: 12,
            startDate: "2026-01-01",
            status: "active"
          }
        ];
        state.transactions = [];
        
        // Generate dues
        generateDues();
        
        // Get monthly balance data
        const balanceData = getMonthlyBalanceData();
        
        // Restore state
        state.contracts = originalContracts;
        state.transactions = originalTransactions;
        
        if (balanceData.length > 0) {
          const firstMonth = balanceData[0];
          const expectedOperatorDues = 500 * state.exchangeRates.IQD;
          const expectedFunderDues = 300000;
          
          if (firstMonth.funderDues === expectedFunderDues && 
              firstMonth.operatorDues === expectedOperatorDues) {
            return { pass: true, detail: `القيم مطابقة للتحويل. مستحقات الممول: ${firstMonth.funderDues} IQD، مستحقات المشغل: ${firstMonth.operatorDues} IQD، الصافي: ${firstMonth.operatorDues - firstMonth.funderDues} IQD.` };
          }
          return { pass: false, detail: `القيم غير مطابقة. المتوقع ممول: ${expectedFunderDues}، مشغل: ${expectedOperatorDues}. الفعلي ممول: ${firstMonth.funderDues}، مشغل: ${firstMonth.operatorDues}` };
        }
        
        return { pass: false, detail: "لم يتم توليد أي بيانات للميزان الشهري." };
      }
    );

    // 11. Exclude Completed Contracts from Capital Balance Test
    addTest(
      "استثناء العقود المكتملة من ميزان رأس المال (Exclude Completed Contracts)",
      "التحقق من أن العقود ذات الحالة 'completed' لا تدخل في حساب ميزان رأس المال الإجمالي للممولين والمشغلين.",
      () => {
        const originalContracts = [...state.contracts];
        
        state.contracts = [
          {
            id: "t_cnt_active",
            partyName: "ممول نشط",
            type: "creditor",
            principal: 50000,
            principalCurrency: "USD",
            returnCurrency: "IQD",
            dividendType: "fixed",
            monthlyDividendAmount: 1500000,
            duration: 12,
            startDate: "2026-01-01",
            status: "active"
          },
          {
            id: "t_cnt_completed",
            partyName: "ممول مكتمل",
            type: "creditor",
            principal: 30000,
            principalCurrency: "USD",
            returnCurrency: "IQD",
            dividendType: "fixed",
            monthlyDividendAmount: 900000,
            duration: 12,
            startDate: "2026-01-01",
            status: "completed"
          }
        ];
        
        const capData = getCapitalBalanceData("USD");
        state.contracts = originalContracts;
        
        if (capData.totalFunderCapital === 50000) {
          return { pass: true, detail: `رأس مال الممولين النشط: $${capData.totalFunderCapital.toLocaleString()} USD (تم استثناء الممول المكتمل بنجاح).` };
        }
        return { pass: false, detail: `فشل الفحص. المتوقع: 50000، المحسوب: ${capData.totalFunderCapital}` };
      }
    );

    // 12. Use custom exchange rate in monthly balance sheet conversion
    addTest(
      "استخدام سعر صرف العقد المخصص في تحويلات الميزان الشهري",
      "التحقق من أن الميزان الموحد بالدولار يستخدم سعر صرف العقد المخصص (مثلاً 1,500) بدلاً من العام (مثلاً 1,450).",
      () => {
        const originalContracts = [...state.contracts];
        const originalTransactions = [...state.transactions];
        
        state.contracts = [
          {
            id: "t_cnt_custom_rate",
            partyName: "ممول بسعر صرف مخصص",
            type: "creditor",
            principal: 10000,
            principalCurrency: "USD",
            returnCurrency: "IQD",
            dividendType: "fixed",
            monthlyDividendAmount: 300000,
            customExchangeRate: 1500.0,
            duration: 12,
            startDate: "2026-01-01",
            status: "active"
          }
        ];
        state.transactions = [];
        
        generateDues();
        
        // Convert to USD monthly balance
        const balanceData = getMonthlyBalanceData("USD");
        state.contracts = originalContracts;
        state.transactions = originalTransactions;
        
        if (balanceData.length > 0) {
          const firstMonth = balanceData[0];
          // 300,000 IQD return at contract custom exchange rate of 1500 = 200 USD
          const expectedFunderUSD = 200; 
          
          if (firstMonth.funderDues === expectedFunderUSD) {
            return { pass: true, detail: `القيمة المحولة بالدولار بسعر العقد المخصص: $${firstMonth.funderDues} USD (مطابق للمتوقع $200).` };
          }
          return { pass: false, detail: `القيمة المحولة غير دقيقة. المتوقع: ${expectedFunderUSD}، الفعلي: ${firstMonth.funderDues}` };
        }
        return { pass: false, detail: "لم يتم توليد أي بيانات للميزان الشهري." };
      }
    );

    // --- EXECUTE RUNNER ---
    window.addEventListener('DOMContentLoaded', () => {
      let passed = 0;
      let failed = 0;
      const listContainer = document.getElementById('test-list-container');
      
      tests.forEach(test => {
        let result;
        try {
          result = test.runFn();
        } catch (e) {
          result = { pass: false, detail: "حدث خطأ برمي أثناء تشغيل الفحص: " + e.message };
        }
        
        if (result.pass) {
          passed++;
        } else {
          failed++;
        }
        
        const testCard = document.createElement('div');
        testCard.className = `test-card ${result.pass ? 'pass' : 'fail'}`;
        testCard.innerHTML = `
          <div class="test-details">
            <span class="test-name">${test.name}</span>
            <span class="test-desc">${test.description}</span>
            <span style="font-size: 0.8rem; color: ${result.pass ? 'var(--color-success)' : 'var(--color-danger)'}; font-family: 'Tajawal', sans-serif; margin-top: 5px;">
              ${result.detail}
            </span>
          </div>
          <div>
            <span class="status-badge ${result.pass ? 'pass' : 'fail'}">
              <i data-lucide="${result.pass ? 'check' : 'x'}"></i>
              <span>${result.pass ? 'ناجح' : 'فاشل'}</span>
            </span>
          </div>
        `;
        listContainer.appendChild(testCard);
      });
      
      document.getElementById('total-tests').innerText = tests.length;
      document.getElementById('pass-tests').innerText = passed;
      document.getElementById('fail-tests').innerText = failed;
      
      lucide.createIcons();
    });
  </script>
</body>
</html>
